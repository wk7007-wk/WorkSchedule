<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>근무표</title><link rel="stylesheet" href="style.css"></head><body>
<div style="position:sticky;top:0;z-index:100;background:#1A1A30;border-bottom:1px solid #2E2E52;">
<div style="display:flex;align-items:center;justify-content:center;padding:4px 8px;gap:4px;">
<button class="btn nav-btn" id="prevW" style="font-size:.7rem;min-width:32px;min-height:32px;padding:4px;">◀◀</button>
<button class="btn nav-btn" id="prevD" style="font-size:.8rem;min-width:32px;min-height:32px;padding:4px;">◀</button>
<span class="date-display" id="dateDisp" style="cursor:pointer;min-width:90px;"></span>
<button class="btn nav-btn" id="nextD" style="font-size:.8rem;min-width:32px;min-height:32px;padding:4px;">▶</button>
<button class="btn nav-btn" id="nextW" style="font-size:.7rem;min-width:32px;min-height:32px;padding:4px;">▶▶</button></div>
<div style="display:flex;align-items:center;justify-content:space-between;padding:0 8px 4px;gap:4px;">
<div style="display:flex;gap:4px;"><button class="btn emp-mgr-btn" id="empMgrBtn">직원</button><button class="btn emp-mgr-btn" id="dayoffMgrBtn" style="color:#E74C3C;border-color:#E74C3C55;">휴무</button></div>
<div style="display:flex;gap:4px;"><button class="btn btn-sm" id="shareBtn" style="font-size:.75rem;padding:4px 8px;min-width:auto;color:#9090A8;border-color:#2E2E52;">공유</button><button class="btn btn-sm" id="urlBtn" style="font-size:.75rem;padding:4px 8px;min-width:auto;color:#707088;border-color:#2E2E52;">URL</button><button class="btn btn-sm" id="refreshBtn" style="font-size:.75rem;padding:4px 8px;min-width:auto;color:#707088;border-color:#2E2E52;">↻</button></div></div></div>
<div id="briefing" style="background:#1e1e3a;border-bottom:1px solid #2E2E52;padding:6px 4px;font-size:.75rem;"></div>
<div class="layout-tabs" id="layoutTabs"><button class="layout-tab active" data-tab="timebar">타임바</button><button class="layout-tab" data-tab="list">리스트</button></div>
<div class="date-strip" id="dateStrip"></div>
<div class="loading" id="loader"><div class="spinner"></div>불러오는 중...</div>
<div id="tabContent" style="display:none;"><div class="tab-panel active" id="pTimebar"><div id="tbCon"></div></div><div class="tab-panel" id="pList"><div id="lsCon"></div></div></div>
<div class="date-picker-overlay" id="dpOverlay"><div class="date-picker-list" id="dpList"></div></div>
<div class="week-section"><div class="week-header" id="weekToggle"><h3>주간 개요</h3><span class="arrow" id="weekArrow">▼</span></div><div class="week-body" id="weekBody"><div class="week-grid" id="weekGrid"></div><div class="week-offs" id="weekOffs"></div></div></div>
<div class="modal-overlay" id="shiftModal"><div class="modal-content" style="max-width:420px;">
<button class="modal-close" id="shiftClose">&times;</button><div class="modal-title" id="shiftTitle">근무 수정</div>
<div class="form-group"><label>직원</label><div class="emp-chips" id="shiftChips"></div></div>
<div class="form-group"><label>역할</label><div class="role-pills" id="rolePills"><div class="role-pill" data-role="주방" style="--pill-color:#E67E22;">주방</div><div class="role-pill" data-role="차배달" style="--pill-color:#4ECDC4;">차배달</div><div class="role-pill" data-role="오토바이" style="--pill-color:#FFD700;">오토바이</div></div></div>
<div class="form-group"><label>시간 (게이지 드래그)</label><div class="shift-gauge-wrap"><div class="shift-gauge" id="gauge"><div class="shift-gauge-fill" id="gFill"></div><div class="shift-gauge-labels" id="gLabels"></div></div><div id="gTicks" style="display:flex;justify-content:space-between;font-size:.6rem;color:#707088;margin-top:2px;"></div></div></div>
<div class="form-group" style="display:flex;gap:8px;align-items:center;"><div style="flex:1;"><label style="font-size:.7rem;">시작</label><select class="form-input" id="selStart" style="font-size:.9rem;"></select></div><span style="color:#707088;margin-top:14px;">~</span><div style="flex:1;"><label style="font-size:.7rem;">종료</label><select class="form-input" id="selEnd" style="font-size:.9rem;"></select></div></div>
<div class="form-group"><label>빠른선택</label><div class="presets" id="presets"><button class="preset-btn" data-s="10:00" data-e="18:00">10-18</button><button class="preset-btn" data-s="10:00" data-e="20:00">10-20</button><button class="preset-btn" data-s="17:00" data-e="03:00">17-03</button><button class="preset-btn" data-s="18:00" data-e="03:00">18-03</button><button class="preset-btn" data-s="16:00" data-e="00:00">16-24</button><button class="preset-btn" data-s="10:00" data-e="03:00">풀</button></div></div>
<div class="modal-footer" style="flex-wrap:wrap;"><button class="btn btn-danger btn-sm" id="shiftDayoff" style="font-size:.7rem;">휴무지정</button><button class="btn btn-danger" id="shiftDel" style="display:none;">삭제</button><button class="btn btn-gold btn-sm" id="shiftFixed" style="font-size:.7rem;">고정</button><button class="btn" id="shiftCancel">취소</button><button class="btn btn-accent" id="shiftSave">저장</button></div></div></div>
<div class="modal-overlay" id="empModal"><div class="modal-content"><button class="modal-close" id="empClose">&times;</button><div class="modal-title">직원관리</div><div id="empList"></div><button class="btn btn-accent" id="addEmpBtn" style="width:100%;margin-top:8px;">+ 직원 추가</button></div></div>
<div class="modal-overlay" id="empEditModal"><div class="modal-content"><button class="modal-close" id="empEditClose">&times;</button><div class="modal-title" id="empEditTitle">직원 추가</div>
<div class="form-group"><label>이름</label><input class="form-input" id="empName" type="text" placeholder="홍길동"></div>
<div class="form-group"><label>전화번호</label><input class="form-input" id="empPhone" type="tel" placeholder="010-0000-0000"></div>
<div class="form-group"><label>색상</label><div class="color-picker" id="colorPicker"></div></div>
<div class="form-group"><label>역할</label><select class="form-input" id="empRole"><option value="">미지정</option><option value="주방">주방</option><option value="차배달">차배달</option><option value="오토바이">오토바이</option></select></div>
<div class="form-group"><label>시급</label><input class="form-input" id="empRate" type="number" placeholder="0" min="0"></div>
<div class="modal-footer"><button class="btn" id="empEditCancel">취소</button><button class="btn btn-accent" id="empEditSave">저장</button></div></div></div>
<div class="modal-overlay" id="dayoffModal"><div class="modal-content"><button class="modal-close" id="dayoffClose">&times;</button><div class="modal-title">휴무 관리</div>
<div style="margin-bottom:10px;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><select class="form-input" id="doEmpSel" style="flex:1;"></select><input class="form-input" id="doDate" type="date" style="flex:1;"><button class="btn btn-accent btn-sm" id="doAddBtn">추가</button></div>
<div style="margin-bottom:8px;"><textarea class="form-input" id="doBulk" placeholder="여러 형태로 입력 가능:&#10;이원규 2/25, 2/26&#10;권연옥 3/1~3/3&#10;리 2025-03-05&#10;히오 화,목 (이번주)" rows="4" style="font-size:.8rem;"></textarea><button class="btn btn-sm" id="doBulkBtn" style="width:100%;margin-top:4px;color:#FFD700;border-color:#FFD700;">일괄 등록</button></div></div>
<div style="font-size:.85rem;color:#FFD700;font-weight:600;margin-bottom:6px;">등록된 휴무</div><div id="doList" style="max-height:300px;overflow-y:auto;"></div></div></div>
<div class="toast" id="toast"></div><script src="app.js"></script></body></html>
